name: Helios Sync

on:
  push:
    branches:
      - $default-branch
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: geoffsee/helios-action@v1
        with:
          helios-url: ${{ secrets.HELIOS_URL }}
          api-key: ${{ secrets.HELIOS_KEY }}
