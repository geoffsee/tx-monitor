name: Test

on:
  push:
    branches:
      - "**"
  # pull_request_target runs in the base repo context and is not blocked by
  # first-time contributor approval when Autopilot syncs PR branches as
  # github-actions[bot].
  pull_request_target:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun test

      - name: Build
        run: bun run build
