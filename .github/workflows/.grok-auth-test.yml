name: Grok Auth Test

on:
  push:
    branches:
      - grok-auth-test
  workflow_dispatch:

jobs:
  grok-auth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install oz CLI
        uses: geoffsee/oz/action@main
        with:
          version: latest

      - name: Restore GROK_CREDENTIALS from oz
        env:
          OZ_API_KEY: ${{ secrets.OZ_API_KEY }}
          OZ_API_URL: ${{ secrets.OZ_API_URL }}
          OZ_PROJECT: ${{ secrets.OZ_PROJECT }}
        run: |
          set -euo pipefail
          : "${OZ_API_KEY:?OZ_API_KEY secret is required}"
          : "${OZ_API_URL:?OZ_API_URL secret is required}"
          : "${OZ_PROJECT:?OZ_PROJECT secret is required}"
          echo "Restoring GROK_CREDENTIALS from oz..."
          # OZ_API_KEY / OZ_API_URL are read by the CLI; secret value never echoed.
          GROK_CREDENTIALS="$(oz secrets get GROK_CREDENTIALS --project "$OZ_PROJECT")"
          if [ -z "$GROK_CREDENTIALS" ]; then
            echo "oz returned an empty GROK_CREDENTIALS value" >&2
            exit 1
          fi
          # Mask before writing env so later steps cannot leak it in logs.
          echo "::add-mask::$GROK_CREDENTIALS"
          {
            echo "GROK_CREDENTIALS<<EOF"
            echo "$GROK_CREDENTIALS"
            echo "EOF"
          } >> "$GITHUB_ENV"
          echo "GROK_CREDENTIALS restored from oz (masked; never logged)"

      - name: Run Grok auth verification (writes ~/.grok/auth.json + tests bundled CLI prompt)
        run: bash scripts/verify-grok-auth.sh

      - name: Report result
        if: always()
        run: |
          echo "Grok auth test workflow completed."
          echo "See previous step logs for 'Grok OAuth verified' (success) or failure details."
