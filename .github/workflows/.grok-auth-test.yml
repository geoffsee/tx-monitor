name: Grok Auth Test

on:
  push:
    branches:
      - grok-auth-test
  workflow_dispatch:

jobs:
  grok-auth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install oz CLI
        run: |
          set -euo pipefail
          # https://github.com/geoffsee/oz — binary assets: cli-{version}-{target}.tar.gz
          OS="$(uname -s | tr '[:upper:]' '[:lower:]')"
          ARCH="$(uname -m)"
          case "$ARCH" in
            x86_64|amd64) ARCH="x86_64" ;;
            aarch64|arm64) ARCH="aarch64" ;;
            *) echo "Unsupported arch: $ARCH" >&2; exit 1 ;;
          esac
          case "$OS" in
            linux) TARGET="${ARCH}-unknown-linux-gnu" ;;
            darwin) TARGET="${ARCH}-apple-darwin" ;;
            *) echo "Unsupported OS: $OS" >&2; exit 1 ;;
          esac
          VERSION="$(curl -fsSL https://api.github.com/repos/geoffsee/oz/releases/latest | jq -r .tag_name | sed 's/^v//')"
          echo "Installing oz CLI v${VERSION} (${TARGET})..."
          curl -fsSL "https://github.com/geoffsee/oz/releases/download/v${VERSION}/cli-${VERSION}-${TARGET}.tar.gz" | tar -xz
          chmod +x oz
          sudo mv oz /usr/local/bin/oz
          oz --help >/dev/null
          echo "oz CLI installed: $(command -v oz)"

      - name: Restore GROK_CREDENTIALS from oz
        env:
          OZ_API_KEY: ${{ secrets.OZ_API_KEY }}
          OZ_API_URL: ${{ secrets.OZ_API_URL }}
          OZ_PROJECT: ${{ secrets.OZ_PROJECT }}
        run: |
          set -euo pipefail
          echo "Restoring GROK_CREDENTIALS from oz using OZ_* envs..."
          GROK_CREDENTIALS=$(oz get GROK_CREDENTIALS)
          echo "::add-mask::$GROK_CREDENTIALS"
          echo "GROK_CREDENTIALS=$GROK_CREDENTIALS" >> "$GITHUB_ENV"
          echo "GROK_CREDENTIALS restored from oz (masked; never logged)"

      - name: Run Grok auth verification (writes ~/.grok/auth.json + tests bundled CLI prompt)
        run: bash scripts/verify-grok-auth.sh

      - name: Report result
        if: always()
        run: |
          echo "Grok auth test workflow completed."
          echo "See previous step logs for 'Grok OAuth verified' (success) or failure details."
